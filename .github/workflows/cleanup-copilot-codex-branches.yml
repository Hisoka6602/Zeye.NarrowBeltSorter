name: 清理包含Copilot或Codex的分支

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  cleanup-branches:
    name: 删除匹配分支
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 扫描并删除分支
        uses: actions/github-script@v7
        with:
          script: |
            const defaultBranch = context.payload.repository.default_branch;
            const currentBranch = context.ref?.startsWith("refs/heads/")
              ? context.ref.replace("refs/heads/", "")
              : "";
            const reservedBranches = new Set(["main", "master", defaultBranch, currentBranch]);
            const matcher = /(copilot|codex)/i;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const branch of branches) {
              const branchName = branch.name;
              if (reservedBranches.has(branchName)) {
                core.info(`跳过保留分支：${branchName}`);
                continue;
              }

              if (!matcher.test(branchName)) {
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branchName}`,
                });
                core.info(`已删除分支：${branchName}`);
              } catch (error) {
                core.warning(`删除分支失败：${branchName}，原因：${error.message}`);
              }
            }
